name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request_target:
    # 🚀 Added 'edited' so renaming a PR updates the draft immediately
    types: [opened, reopened, synchronize, labeled, edited]

concurrency:
  group: release-drafter
  cancel-in-progress: false

# 🛑 1. Baseline: No permissions allowed by default
permissions:
  contents: none

jobs:
  update_release_draft:
    # ✅ 2. Specifically grant permissions to this job only
    permissions:
      contents: write   # Required to create/update the release draft
      pull-requests: write # Required to read PR labels and metadata
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Update Release Draft
        uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2 # v7.2.1
        with:
          committish: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
