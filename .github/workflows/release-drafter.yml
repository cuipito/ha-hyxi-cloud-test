name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request_target:
    # 🚀 Added 'edited' so renaming a PR updates the draft immediately
    types: [opened, reopened, synchronize, labeled, edited]

concurrency:
  group: release-drafter
  cancel-in-progress: false

# 🛑 1. Baseline: No permissions allowed by default
permissions:
  contents: none

jobs:
  update_release_draft:
    # ✅ 2. Specifically grant permissions to this job only
    permissions:
      contents: write   # Required to create/update the release draft
      pull-requests: write # Required to read PR labels and metadata
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Update Release Draft
        uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2 # v7.2.1
        with:
          committish: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
