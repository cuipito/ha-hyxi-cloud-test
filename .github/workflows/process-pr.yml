name: "2. Process PR Labels (Privileged)"

on:
  workflow_run:
    workflows: ["1. Receive PR (Untrusted)"]
    types: [completed]

# 🛑 1. Baseline: No global permissions
permissions:
  contents: none

jobs:
  apply-and-check:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}

    # ✅ 2. Scoped Permissions: Restricted to the specific job
    permissions:
      pull-requests: write # To read PR labels and metadata
      statuses: write      # To create the Green Check/Red X on the commit
      issues: write        # To comment on the PR if labels are missing
      actions: read        # Required to download artifacts from the 'workflow_run' source

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
      - name: Download PR Metadata
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: pr-metadata
          path: pr-metadata
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read PR Data
        id: pr_data
        run: |
          PR_NUMBER=$(tr -d '\n' < pr-metadata/pr_number)
          PR_SHA=$(tr -d '\n' < pr-metadata/pr_sha)
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          echo "PR_SHA=$PR_SHA" >> "$GITHUB_ENV"

      - name: Apply Labels
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: "pr-metadata/labeler.yml"
          pr-number: ${{ env.PR_NUMBER }}
          sync-labels: false

      - name: Verify & Enforce Labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const prSha = process.env.PR_SHA;

            // Fetch the newly applied labels
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const labels = pullRequest.labels;
            const hasLabels = labels.length > 0;

            // 1. Update the PR's visual status check (Green Check or Red X)
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: prSha,
              state: hasLabels ? 'success' : 'error',
              context: 'Label Enforcement',
              description: hasLabels ? `Found ${labels.length} label(s)` : 'No labels found. Please add one.',
            });

            // 2. Add a helpful comment if it failed
            if (!hasLabels) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: "❌ **Label Check Failed:** I couldn't automatically label this PR, and no manual labels were added. Please add a label (e.g., `bugfix`, `new-feature`) so the Release Drafter can categorize it!"
              });
              core.setFailed("No labels found.");
            } else {
              console.log(`✅ PR is labeled with: ${labels.map(l => l.name).join(", ")}`);
            }
