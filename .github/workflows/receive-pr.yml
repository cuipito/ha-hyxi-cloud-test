name: "1. Receive PR (Untrusted)"
permissions:
  contents: read

on:
  pull_request:
    # We use standard pull_request here so it's fully sandboxed
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

jobs:
  gather-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
      - name: Checkout PR Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Package PR Metadata
        run: |
          mkdir -p pr-metadata
          # Save the PR Number and Commit Hash
          echo ${{ github.event.number }} > pr-metadata/pr_number
          echo ${{ github.event.pull_request.head.sha }} > pr-metadata/pr_sha

          # Copy the labeler config if it exists
          if [ -f .github/labeler.yml ]; then
            cp .github/labeler.yml pr-metadata/
          else
            echo "" > pr-metadata/labeler.yml
          fi

      - name: Upload PR Metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-metadata
          path: pr-metadata/
          overwrite: true
