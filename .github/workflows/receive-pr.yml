name: "1. Receive PR (Untrusted)"
permissions:
  contents: read

on:
  pull_request:
    # We use standard pull_request here so it's fully sandboxed
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]

jobs:
  gather-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
      - name: Checkout PR Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Package PR Metadata
        run: |
          mkdir -p pr-metadata
          # Save the PR Number and Commit Hash
          echo ${{ github.event.number }} > pr-metadata/pr_number
          echo ${{ github.event.pull_request.head.sha }} > pr-metadata/pr_sha

          # Copy the labeler config if it exists
          if [ -f .github/labeler.yml ]; then
            cp .github/labeler.yml pr-metadata/
          else
            echo "" > pr-metadata/labeler.yml
          fi

      - name: Upload PR Metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-metadata
          path: pr-metadata/
          overwrite: true
