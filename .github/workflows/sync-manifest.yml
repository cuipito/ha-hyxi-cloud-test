name: Sync Manifest on Release

on:
  release:
    types: [published]

# 🛑 1. Set global permissions to the bare minimum
permissions:
  contents: none

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    # ✅ 2. Give ONLY this job the permission to write
    permissions:
      contents: write # Needed to push the manifest update and upload the zip

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Required if you plan to commit the manifest change back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest version
        run: |
          # Get the tag name (e.g., v1.2.6)
          TAG_NAME="${{ github.ref_name }}"
          CLEAN_VER=$(echo $TAG_NAME | sed 's/^v//')

          # Update the manifest locally (DO NOT COMMIT)
          jq ".version = \"$CLEAN_VER\"" custom_components/hyxi_cloud/manifest.json > temp.json && mv temp.json custom_components/hyxi_cloud/manifest.json

          # Zip the integration folder
          cd custom_components
          zip -r ../hyxi_cloud.zip hyxi_cloud/
