name: Release Publisher

on:
  release:
    types: [published]

# 🛑 1. Start with zero permissions at the top level
permissions:
  contents: none

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    # ✅ 2. Explicitly grant 'write' ONLY for this specific release task
    permissions:
      contents: write # To read the code and upload the asset

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            uploads.github.com:443

      - name: 📥 Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 📝 Inject Version into Manifest
        run: |
          # Grab the release tag (e.g., v1.3.0) and strip the 'v'
          TAG_NAME="${{ github.event.release.tag_name }}"
          CLEAN_VERSION="${TAG_NAME#v}"

          echo "Injecting version $CLEAN_VERSION into manifest..."
          jq ".version = \"$CLEAN_VERSION\"" custom_components/hyxi_cloud_dev/manifest.json > tmp.json
          mv tmp.json custom_components/hyxi_cloud_dev/manifest.json

      - name: 📦 Create Zip Archive
        run: |
          # Go INSIDE the integration folder and zip the contents
          # This ensures manifest.json is at the root of the zip file
          cd custom_components/hyxi_cloud_dev
          zip -r ../../hyxi_cloud_dev.zip .
          cd ../..

      - name: 🚀 Upload Zip to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: hyxi_cloud_dev.zip
          tag_name: ${{ github.event.release.tag_name }}
          overwrite_files: true
