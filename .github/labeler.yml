# 🚀 New Features (Logic changes)
"new-feature":
  - head-branch: ["^feature/", "^feat/"]
  - title: ["^feat:", "^feature:", "🚀"]

# 🐛 Bug Fixes (Title or Branch matching)
"bugfix":
  - head-branch: ["^fix/", "^bug/"]
  - title: ["^fix:", "^bug:", "🐛"]
  - changed-files:
      - any-glob-to-any-file: "custom_components/hyxi_cloud_dev/*.py"

# 🎨 Style
"style":
  - changed-files:
      - any-glob-to-any-file:
          - "custom_components/hyxi_cloud_dev/static/**/*"
          - "custom_components/hyxi_cloud_dev/brand/**/*"
          - "custom_components/hyxi_cloud_dev/translations/**/*"

# 🧪 Tests
"test":
  - changed-files:
      - any-glob-to-any-file: "tests/**/*"

# 📦 Refactor
"refactor":
  - head-branch: ["^refactor/"]
  - title: ["^refactor:"]

# ⬆️ Dependency Updates
"dependencies":
  - author: ["dependabot[bot]"]
  - changed-files:
      - any-glob-to-any-file:
          - "requirements.txt"
          - "pyproject.toml"

# ♻️ Chore (Metadata & Housekeeping)
"chore":
  - changed-files:
      - any-glob-to-any-file:
          - "custom_components/hyxi_cloud_dev/manifest.json"
          - "custom_components/hyxi_cloud_dev/hacs.json"
          - ".gitignore"

# Label for GitHub Actions, Scripts, and Repo Infrastructure
"ci":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**/*"  # 🚀 Double asterisks catch all subfolders/files
          - "dev_env/**/*"
          - ".vscode/tasks.json"

# 📚 Documentation
"documentation":
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"                                      # Root level markdown files
          - "LICENSE"                                   # Legal updates
          - "custom_components/hyxi_cloud_dev/strings.json" # Translation updates
          - "docs/**/*"                                 # Anything inside a docs folder
          - ".github/ISSUE_TEMPLATE/*.md"               # Issue template updates
